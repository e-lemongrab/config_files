[boot]
systemd=true

[automount]
# Enable mounting of Windows drives at /mnt/c, etc.
enabled=true
# Options for mounted drives (options passed to mount -t drvfs)
options="metadata,umask=022,fmask=111"
# Mount Windows swap file (if swapFile path specified in .wslconfig is ignored)
# To use a custom swap file location, uncomment and adjust:
# mount = C:\\WSL2\\swap.vhdx /mnt/c/WSL2/swap.vhdx none defaults,bind 0 0
