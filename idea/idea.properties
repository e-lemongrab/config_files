###############################
## IDEA PROPERTIES (non-JVM) ##
###############################
## This file contains IntelliJ IDEA-specific properties.
## JVM flags (-XX, -Xms, -Xmx) belong in idea64.vmoptions — NOT here.

# Performance settings
idea.dynamic.classpath=false
idea.max.intellisense.filesize=2500
idea.max.content.load.filesize=20000

# UI settings
idea.popup.weight=heavy
idea.throttling.font=true

# IDE thread pool (tuned for your hardware)
idea.executable.thread.pool.size=4

# File watchers
ide.mac.file.chooser.native.enabled=true
idea.files.exclude.colorize=true

# Git integration
git4idea.popup.show.after.fail.on.status=true

# Analytics
researcher.opted.in=false
